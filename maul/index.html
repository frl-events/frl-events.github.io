<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>MAUL | ATL’s Premier Furry Nightclub Event</title>
  <meta name="description" content="MAUL — ATL's Premier Furry Nightclub Event. THANK YOU EVERYONE FOR COMING OUT! PICS, VIDEOS, AND FUTURE DATES COMING SOON!" />
  <meta name="theme-color" content="#07070c" />
  <meta name="robots" content="index,follow,max-image-preview:large" />

  <!-- Canonical URL for this page -->
  <link rel="canonical" href="https://frl.events/maul/" />

  <!-- Preload poster (files live in /maul/) -->
  <link rel="preload" as="image" href="./MAULPOSTERFINAL_website.png" />

  <!-- Open Graph / Social preview (use absolute URLs) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="MAUL | ATL’s Premier Furry Nightclub Event" />
  <meta property="og:description" content="THANK YOU EVERYONE FOR COMING OUT! PICS, VIDEOS, AND FUTURE DATES COMING SOON!" />
  <meta property="og:url" content="https://frl.events/maul/" />

  <!-- Prefer banner for social card. If you want the poster instead, swap to MAULPOSTERFINAL_website.png -->
  <meta property="og:image" content="https://frl.events/maul/MAUL%20HEADER.png" />
  <meta property="og:image:alt" content="MAUL — ATL's Premier Furry Nightclub Event" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="MAUL | ATL’s Premier Furry Nightclub Event" />
  <meta name="twitter:description" content="THANK YOU EVERYONE FOR COMING OUT! PICS, VIDEOS, AND FUTURE DATES COMING SOON!" />
  <meta name="twitter:image" content="https://frl.events/maul/MAUL%20HEADER.png" />

  <style>
    :root{
      --bg: #07070c;
      --fg: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.72);
      --stroke: rgba(255,255,255,.14);
      --shadow: 0 20px 60px rgba(0,0,0,.55);
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      background: var(--bg);
      overflow-x:hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--fg);
    }

    .bg{
      position:fixed; inset:-40vmax;
      z-index:-3;
      background:
        radial-gradient(35vmax 30vmax at 20% 20%, rgba(120,246,255,.18), transparent 60%),
        radial-gradient(40vmax 35vmax at 75% 25%, rgba(255,79,216,.16), transparent 60%),
        radial-gradient(50vmax 40vmax at 45% 75%, rgba(168,255,103,.10), transparent 62%),
        linear-gradient(180deg, rgba(255,255,255,.02), transparent 40%, rgba(255,255,255,.01));
      filter: blur(20px) saturate(130%);
    }

    .wrap{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 28px 16px;
    }

    .frame{
      width: min(980px, 100%);
      position: relative;
    }

    /* Poster: square edges */
    .poster{
      width: 100%;
      height: auto;
      display:block;
      border-radius: 0;
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow);
      background: rgba(255,255,255,.02);
    }

    /* Big message overlay ~4/5 down the poster */
    .notice{
      position:absolute;
      left: 50%;
      top: 80%;
      transform: translate(-50%, -50%);
      width: min(86%, 720px);
      text-align:center;
      padding: 18px 18px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(0,0,0,.48);
      box-shadow: 0 10px 30px rgba(0,0,0,.45);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      font-weight: 900;
      letter-spacing: .04em;
      text-transform: uppercase;
      line-height: 1.25;
      user-select:none;
    }

    @media (max-width: 520px){
      .wrap{ padding: 18px 12px; }
      .notice{
        padding: 14px 14px;
        border-radius: 16px;
        font-size: 13px;
      }
    }

    /* Invisible text for SEO + accessibility (doesn't change visuals) */
    .sr-only{
      position:absolute !important;
      width:1px; height:1px;
      padding:0; margin:-1px;
      overflow:hidden; clip:rect(0,0,0,0);
      white-space:nowrap; border:0;
    }
  </style>
</head>

<body>
  <div class="bg" aria-hidden="true"></div>

  <main class="wrap">
    <h1 class="sr-only">MAUL — ATL’s Premier Furry Nightclub Event</h1>

    <div class="frame">
      <!-- Both files live in /maul/ next to this index.html -->
      <img
        class="poster"
        src="./MAULPOSTERFINAL_website.png"
        alt="MAUL poster — ATL’s Premier Furry Nightclub Event"
        width="2000"
        height="2600"
        loading="eager"
        decoding="async"
        fetchpriority="high"
      />

      <div class="notice" aria-label="Announcement">
        THANK YOU EVERYONE FOR COMING OUT!<br/>
        PICS, VIDEOS, AND FUTURE DATES COMING SOON!
      </div>
    </div>
  </main>
</body>
</html>
