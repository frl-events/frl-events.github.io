<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Past Events | Posters and Galleries | FRL Events</title>
  <meta name="description" content="Browse archived poster artwork and photo galleries from nights produced by FRL Events." />
  <meta name="robots" content="index,follow,max-image-preview:large" />
  <meta name="theme-color" content="#09090b" />
  <link rel="canonical" href="https://frl.events/past-events/" />
  <link rel="icon" type="image/png" href="/assets/frl-claws-circle-white.png" />
  <link rel="apple-touch-icon" href="/assets/frl-claws-circle-white.png" />
  <link rel="preload" as="image" href="/assets/frl-logo-white.png" />
  <link rel="stylesheet" href="/site.css" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="FRL Events" />
  <meta property="og:title" content="Past Events | FRL Events" />
  <meta property="og:description" content="Archived poster artwork and photo galleries from FRL Events." />
  <meta property="og:url" content="https://frl.events/past-events/" />
  <meta property="og:image" content="https://frl.events/maul/maul1/poster.png" />
  <meta property="og:image:alt" content="Archived MAUL poster artwork" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Past Events | FRL Events" />
  <meta name="twitter:description" content="Archived poster artwork and photo galleries from FRL Events." />
  <meta name="twitter:image" content="https://frl.events/maul/maul1/poster.png" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "@id": "https://frl.events/#organization",
        "name": "FRL Events",
        "url": "https://frl.events/"
      },
      {
        "@type": "CollectionPage",
        "@id": "https://frl.events/past-events/#webpage",
        "name": "Past Events",
        "url": "https://frl.events/past-events/",
        "isPartOf": {
          "@id": "https://frl.events/#website"
        },
        "publisher": {
          "@id": "https://frl.events/#organization"
        }
      },
      {
        "@type": "ImageObject",
        "@id": "https://frl.events/past-events/#maul-archived-poster",
        "name": "Archived MAUL poster artwork",
        "contentUrl": "https://frl.events/maul/maul1/poster.png",
        "creator": {
          "@id": "https://frl.events/#organization"
        }
      },
      {
        "@type": "BreadcrumbList",
        "@id": "https://frl.events/past-events/#breadcrumb",
        "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "name": "FRL Events",
            "item": "https://frl.events/"
          },
          {
            "@type": "ListItem",
            "position": 2,
            "name": "Past Events",
            "item": "https://frl.events/past-events/"
          }
        ]
      }
    ]
  }
  </script>
</head>
<body class="archive-page">
  <a class="skip-link" href="#archive">Skip to archive</a>

  <header class="site-header" aria-label="Primary">
    <a class="brand" href="/" aria-label="FRL Events home">
      <img class="brand-logo" src="/assets/frl-logo-white.png" alt="FRL Events" />
    </a>
    <nav class="nav-links" aria-label="Site navigation">
      <a href="/">Home</a>
      <a href="/about/">About</a>
      <a href="/past-events/">Past events</a>
      <a href="/apply-to-dj/">Apply to DJ</a>
    </nav>
  </header>

  <main>
    <section class="section archive-intro" aria-labelledby="page-title">
      <div>
        <p class="eyebrow">Archive</p>
        <h1 id="page-title">Past events</h1>
        <p class="lead">Posters and photos from our past events!</p>
      </div>
    </section>

    <section class="section archive-list" id="archive" aria-label="Past event archive">
      <article class="archive-edition">
        <a class="archive-poster" href="/maul/maul1/poster.png" aria-label="Open MAUL poster">
          <img src="/maul/maul1/poster.png" alt="MAUL poster artwork for Saturday, February 28" loading="eager" />
        </a>

        <div class="archive-details">
          <div class="archive-date">
            <p class="status-label">Date</p>
            <h2>Sat Feb 28</h2>
          </div>

          <div class="archive-collage" data-collage-manifest="/maul/maul1/collage/photos.json" aria-label="Selected MAUL images">
          </div>

          <a class="button button-primary photodump-button" href="/maul/maul1/photodump/">Photodump</a>
        </div>
      </article>
    </section>
  </main>

  <footer class="site-footer">
    <p class="footer-brand">
      <img src="/assets/frl-claws-circle-white.png" alt="" aria-hidden="true" loading="lazy" />
      <a href="/">FRL Events</a>
    </p>
    <p><a href="/llms.txt">llms.txt</a> <span aria-hidden="true">/</span> <a href="/sitemap.xml">sitemap</a></p>
  </footer>

  <script>
    document.querySelectorAll("[data-collage-manifest]").forEach(async (collage) => {
      try {
        const response = await fetch(collage.dataset.collageManifest, { cache: "no-store" });
        if (!response.ok) throw new Error("Missing collage manifest");

        const photos = await response.json();
        if (!Array.isArray(photos) || photos.length === 0) return;

        const columns = Math.min(Math.max(Math.ceil(photos.length / 2), 2), 4);
        collage.style.setProperty("--collage-columns", columns);
        collage.dataset.photoCount = photos.length;

        collage.replaceChildren(...photos.map((photo, index) => {
          const item = document.createElement("div");
          item.className = "photo-slot";

          const image = document.createElement("img");
          image.src = photo.src;
          image.alt = photo.alt || `MAUL collage photo ${index + 1}`;
          image.loading = "lazy";
          image.decoding = "async";

          item.append(image);
          return item;
        }));
      } catch (error) {
        collage.hidden = true;
      }
    });
  </script>
</body>
</html>
